<svg width="1152" height="420" viewBox="0 0 1152 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotsDark" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.25" fill="#E4E4E7" fill-opacity="0.22" />
    </pattern>
    <radialGradient id="dotMaskDark" cx="50%" cy="42%" r="58%" fx="50%" fy="42%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="50%" stop-color="white" stop-opacity="0.9" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <mask id="dotsFadeDark">
      <rect width="1152" height="420" fill="url(#dotMaskDark)" />
    </mask>
    <filter id="blurYellowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="56" />
    </filter>
    <filter id="blurBlueDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="56" />
    </filter>
    <radialGradient id="edgeFadeDark" cx="50%" cy="45%" r="72%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="70%" stop-color="#000000" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92" />
    </radialGradient>
  </defs>

  <rect width="1152" height="420" fill="#000000" />

  <ellipse cx="900" cy="40" rx="300" ry="220" fill="#FDE047" fill-opacity="0.14" filter="url(#blurYellowDark)" />
  <ellipse cx="200" cy="360" rx="280" ry="200" fill="#3B82F6" fill-opacity="0.16" filter="url(#blurBlueDark)" />

  <rect width="1152" height="420" fill="url(#dotsDark)" mask="url(#dotsFadeDark)" />

  <rect width="1152" height="420" fill="url(#edgeFadeDark)" />
</svg>
